services:
  postgres:
    image: postgres:16-alpine
    container_name: calculatrice-postgres
    environment:
      POSTGRES_DB: calculatrice
      POSTGRES_USER: calculatrice
      POSTGRES_PASSWORD: calculatrice
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - calculatrice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calculatrice -d calculatrice"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: calculatrice-backend
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://calculatrice:calculatrice@postgres:5432/calculatrice
    restart: unless-stopped
    networks:
      - calculatrice-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calculatrice-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - calculatrice-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: calculatrice-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - calculatrice-network

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: calculatrice-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    networks:
      - calculatrice-network

  test-python:
    build: ./tests
    environment:
      - BASE_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - test
    networks:
      - calculatrice-network

  test-js:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    profiles: ["test"]

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  calculatrice-network:
    driver: bridge
